<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Dashboard Starter</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f7f7f7;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .panel {
        background: #ffffff;
        border: 1px solid #dddddd;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .book-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #eeeeee;
        padding: 10px 0;
      }
      .book-item:last-child {
        border-bottom: none;
      }
      button {
        cursor: pointer;
      }
      @media (max-width: 600px) {
        .book-item {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Book Dashboard</h1>
      <p>Starter page for the Frontend API Integration Dashboard assignment.</p>

      <div class="panel">
        <label for="search">Search books:</label>
        <input id="search" type="text" placeholder="Type title or author" />
      </div>

      <div class="panel">
        <h2>Books</h2>
        <div id="status">TODO: Show loading, success, or error states here.</div>
        <div id="book-list"></div>
      </div>

      <div class="panel">
        <h2>Book Details</h2>
        <div id="book-details">TODO: Render selected book details here.</div>
      </div>
    </div>

    <script src="starter-app.js"></script>
  </body>
</html>
